<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Prototype Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/style.css">
  <style>
    body {
      background-color: rgba(105, 191, 81); /* Mengikuti warna start-modal */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .register-container {
        max-width: 400px;
        width: 90%;
    }

    .form-group {
        margin-bottom: 12px;
        text-align: left;
    }

    form label {
        display: block;
        margin-bottom: 5px;
        color: #4CAF50;
        text-shadow: 1px 1px 0 #000;
        font-size: 8px;
    }

    form input {
        width: 100%;
        padding: 12px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 10px;
        border: 4px solid #000;
        box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  
  <div class="modal-content register-container">
    <h1 style="color: #4CAF50; text-shadow: 2px 2px 0px #000; font-size: 1.8rem; margin-bottom: 20px;">REGISTER</h1>

    <div class="name-entry-section" style="margin-top:0;">
      <form id="register-form">
        <div class="form-group">
            <label>NICKNAME</label>
            <input type="text" id="reg-nickname" placeholder="PEMAIN_KEREN" required>
        </div>

        <div class="form-group">
            <label>EMAIL</label>
            <input type="email" id="reg-email" placeholder="contoh@gmail.com" required>
        </div>
        
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="reg-password" placeholder="••••••••" required>
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label>KONFIRMASI PASSWORD</label>
            <input type="password" id="reg-confirm" placeholder="••••••••" required>
        </div>

        <button type="submit" class="option-btn action-btn-multi" style="width: 100%; border-color: #4CAF50; color: #1b5e20; font-size: 14px !important;">
           BUAT AKUN
        </button>
      </form>

      <div style="margin-top: 25px; font-size: 8px; text-align: center; color: #333;">
        SUDAH PUNYA AKUN? <a href="/login.html" style="color: #2196F3; text-decoration: none; font-weight: bold; border-bottom: 1px solid #2196F3; padding-bottom: 2px;">LOGIN</a>
      </div>
    </div>
  </div>

  <script type="module">
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const pwd = document.getElementById('reg-password').value;
      const confirmPwd = document.getElementById('reg-confirm').value;

      if (pwd !== confirmPwd) {
          alert('Password tidak cocok!');
          return;
      }

      const nickname = document.getElementById('reg-nickname').value.toUpperCase();
      
      alert('Pendaftaran Berhasil! (Placeholder)');
      
      // Simpan nickname sementara ke localStorage untuk demo
      localStorage.setItem('playerName', nickname);
      
      // Ke halaman utama
      window.location.href = '/';
    });
  </script>
</body>
</html>
